name: CI

on:
  push:
  pull_request:

jobs:
  lightweight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas pytest ruff

      - name: Lint
        run: ruff check .

      - name: Compile
        run: python -m compileall src scripts config tests

      - name: Test
        run: pytest -q

      - name: Validate leaderboard example format
        run: |
          python scripts/validate_leaderboard_submission.py \
            --submission examples/example_leaderboard_submission.csv \
            --metadata_json examples/example_leaderboard_metadata.json \
            --schema_json schemas/leaderboard_submission_schema.json \
            --format_only
